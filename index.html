<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Builder - Create Amazing Apps</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-cube"></i> App Builder</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="previewBtn">
                        <i class="fas fa-eye"></i> Preview
                    </button>
                    <button class="btn btn-primary" id="exportBtn">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3><i class="fas fa-puzzle-piece"></i> Components</h3>
                    <div class="component-list">
                        <div class="component-item" draggable="true" data-type="button">
                            <i class="fas fa-square"></i>
                            <span>Button</span>
                        </div>
                        <div class="component-item" draggable="true" data-type="text">
                            <i class="fas fa-font"></i>
                            <span>Text</span>
                        </div>
                        <div class="component-item" draggable="true" data-type="input">
                            <i class="fas fa-keyboard"></i>
                            <span>Input</span>
                        </div>
                        <div class="component-item" draggable="true" data-type="image">
                            <i class="fas fa-image"></i>
                            <span>Image</span>
                        </div>
                        <div class="component-item" draggable="true" data-type="card">
                            <i class="fas fa-credit-card"></i>
                            <span>Card</span>
                        </div>
                        <div class="component-item" draggable="true" data-type="container">
                            <i class="fas fa-box"></i>
                            <span>Container</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3><i class="fas fa-palette"></i> Themes</h3>
                    <div class="theme-options">
                        <div class="theme-option active" data-theme="light">
                            <div class="theme-preview light"></div>
                            <span>Light</span>
                        </div>
                        <div class="theme-option" data-theme="dark">
                            <div class="theme-preview dark"></div>
                            <span>Dark</span>
                        </div>
                        <div class="theme-option" data-theme="blue">
                            <div class="theme-preview blue"></div>
                            <span>Blue</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Canvas Area -->
            <section class="canvas-area">
                <div class="canvas-header">
                    <h3><i class="fas fa-edit"></i> App Canvas</h3>
                    <div class="canvas-controls">
                        <button class="btn btn-small" id="clearBtn">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                        <button class="btn btn-small" id="undoBtn">
                            <i class="fas fa-undo"></i> Undo
                        </button>
                    </div>
                </div>
                <div class="canvas" id="canvas">
                    <div class="canvas-placeholder">
                        <i class="fas fa-mouse-pointer"></i>
                        <p>Drag components here to build your app</p>
                    </div>
                </div>
            </section>

            <!-- Properties Panel -->
            <aside class="properties-panel">
                <div class="properties-header">
                    <h3><i class="fas fa-cog"></i> Properties</h3>
                </div>
                <div class="properties-content" id="propertiesContent">
                    <div class="no-selection">
                        <i class="fas fa-hand-pointer"></i>
                        <p>Select a component to edit its properties</p>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Preview Modal -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>App Preview</h3>
                <button class="close-btn" id="closePreview">&times;</button>
            </div>
            <div class="modal-body">
                <div class="preview-container" id="previewContainer"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
